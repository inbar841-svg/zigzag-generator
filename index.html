<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zigzag Name Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Hebrew', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        .input-section {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ddd;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 1.1em;
            direction: rtl;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #ffd200;
        }
        input[type="text"]::placeholder {
            color: #666;
        }
        .options {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .option-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }
        input[type="checkbox"], input[type="radio"] {
            accent-color: #ffd200;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            color: #1a1a2e;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,210,0,0.3);
        }
        .btn:active { transform: translateY(0); }
        .results {
            margin-top: 20px;
        }
        .result-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .result-card:hover {
            background: rgba(255,255,255,0.1);
        }
        .result-label {
            font-size: 0.8em;
            color: #ffd200;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .result-text {
            font-family: 'Noto Sans Hebrew', 'Segoe UI', Tahoma, sans-serif;
            font-size: 1.3em;
            direction: rtl;
            word-break: break-word;
            line-height: 2;
            letter-spacing: 2px;
        }
        .note {
            text-align: center;
            color: #888;
            font-size: 0.75em;
            margin-top: 4px;
        }
        .copy-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            font-size: 0.85em;
            white-space: nowrap;
            transition: all 0.2s;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .copy-btn:hover {
            background: rgba(255,210,0,0.2);
            border-color: #ffd200;
        }
        .copy-btn.copied {
            background: rgba(0,200,80,0.2);
            border-color: #0c8;
            color: #0c8;
        }
        .filler-input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.9em;
            direction: ltr;
            outline: none;
            margin-top: 8px;
        }
        .filler-input:focus { border-color: #ffd200; }
        .tip {
            background: rgba(255,210,0,0.08);
            border: 1px solid rgba(255,210,0,0.2);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 0.85em;
            color: #ccc;
            line-height: 1.6;
        }
        .count { color: #ffd200; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Zigzag Name Generator</h1>
        <p class="subtitle">מייצר שמות מוגנים מ-AI לקבוצות טלגרם</p>

        <div class="input-section">
            <label>הכנס מילים בעברית (מופרדות ברווח):</label>
            <input type="text" id="wordsInput" placeholder="ביטקוין קריפטו ישראל מסחר סיגנלים" autofocus>

            <div class="options">
                <div class="option-group">
                    <input type="checkbox" id="addFillers" checked>
                    <label for="addFillers">הוסף מילות מפתח באנגלית</label>
                </div>
            </div>

            <div id="fillerSection">
                <label style="margin-top:12px; font-size:0.85em;">מילות מפתח (ניתן לערוך):</label>
                <input type="text" class="filler-input" id="fillerWords"
                    value="crypto, btc, eth, bitcoin, blockchain, defi, nft, web3, trading, signals, sol, ton, xrp, hodl, dca, vip, pro">
            </div>

            <button class="btn" onclick="generate()">יצירת שמות</button>
        </div>

        <div class="results" id="results"></div>

        <div class="tip">
            <strong>טיפ:</strong> לחץ על "העתק" ליד התוצאה שאתה אוהב, ואז הדבק כשם קבוצה בטלגרם.<br>
            הזיגזג מגן על השם מזיהוי אוטומטי של AI, אבל עדיין ניתן לחיפוש ע"י משתמשים.<br><br>
            <strong>שים לב:</strong> אם התווים נראים מוזר בדפדפן — זה בסדר! בטלגרם זה ייראה מושלם. פשוט תעתיק ותדביק.
        </div>
    </div>

    <script>
        const ZIGZAG = '\u035B';
        const DOT = '\u0307';

        function addZigzag(text) {
            return [...text].map(c => c === ' ' ? ' ' : c + ZIGZAG).join('');
        }

        function addDots(text) {
            return [...text].map(c => c === ' ' ? ' ' : c + DOT).join('');
        }

        function getFillers() {
            const val = document.getElementById('fillerWords').value;
            return val.split(',').map(w => w.trim()).filter(w => w);
        }

        function generateName(words, style, withFillers) {
            const func = style === 'zigzag' ? addZigzag : addDots;
            const fillers = getFillers();
            const parts = [];

            words.forEach((word, i) => {
                parts.push(func(word));
                if (withFillers && i < words.length - 1 && Math.random() < 0.5 && fillers.length) {
                    parts.push(fillers[Math.floor(Math.random() * fillers.length)]);
                }
            });

            return parts.join(' ');
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = 'הועתק!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'העתק';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function createCard(label, text) {
            return `
                <div class="result-card">
                    <div style="flex:1">
                        <div class="result-label">${label}</div>
                        <div class="result-text">${text}</div>
                    </div>
                    <button class="copy-btn" onclick="copyText(this, '${text.replace(/'/g, "\\'")}')">העתק</button>
                </div>
            `;
        }

        function generate() {
            const input = document.getElementById('wordsInput').value.trim();
            if (!input) return;

            const words = input.split(/\s+/);
            const withFillers = document.getElementById('addFillers').checked;
            const resultsDiv = document.getElementById('results');

            let html = '';

            // zigzag only
            html += createCard('זיגזג בלבד', generateName(words, 'zigzag', false));

            // zigzag + fillers
            if (withFillers) {
                html += createCard('זיגזג + מילות מפתח', generateName(words, 'zigzag', true));
                html += createCard('זיגזג + מילות מפתח (2)', generateName(words, 'zigzag', true));
            }

            // dots only
            html += createCard('נקודות בלבד', generateName(words, 'dots', false));

            // dots + fillers
            if (withFillers) {
                html += createCard('נקודות + מילות מפתח', generateName(words, 'dots', true));
            }

            // extra variations
            for (let i = 0; i < 4; i++) {
                const style = Math.random() < 0.5 ? 'zigzag' : 'dots';
                const styleName = style === 'zigzag' ? 'זיגזג' : 'נקודות';
                html += createCard(`וריאציה ${i + 1} (${styleName})`, generateName(words, style, withFillers));
            }

            resultsDiv.innerHTML = html;
        }

        // Enter key
        document.getElementById('wordsInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') generate();
        });

        // Toggle filler section
        document.getElementById('addFillers').addEventListener('change', function() {
            document.getElementById('fillerSection').style.display = this.checked ? 'block' : 'none';
        });
    </script>
</body>
</html>
